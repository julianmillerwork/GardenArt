<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, maximum-scale=1.0">
<style>
    body {
    font-family: Arial, Helvetica, sans-serif;
    color: #555555;
    }
    .formContainer {
        min-height: 100%;
        width: 100%;
        background: white;
        position: absolute;
        padding: 5px 5px 5px 5px;
        box-sizing: border-box;
        border-radius: 8px;
    }
    .formHeader {
        text-align: center;
        color: #46B1E1;
    }
    .formContentContainer {
        margin-top: 15%;
        width: 98%;
    }
    .formInput {
        display: block;
        margin: 0px 0px 15px 20px;
        padding: 4px;
        width: 90%;
        height: 5%;
        box-sizing: border-box;
        border: none;
        outline: none;
        border-bottom: 1px solid #aaa;
        font-size: 16px;
    }
    .submitButton {
        background: #46B1E1;
        color: white;
        margin: 10px 20px;
        width: 90%;
        height: 8%;
        border: none;
        border-radius: 4px;
        text-transform: uppercase;
        cursor: pointer;
        font-weight: 500;
        font-size: 20px;
    }

</style>
<title>AlpsArt Setup - Configure the Wi-Fi</title>
</head>
<body>
<div class="formContainer">
</br>
<div class="formContentContainer">
<h2 class="formHeader">Success!</h2>
</br>
<p align="justify"> The WiFi details have been successfully updated to the device. </p>
<p align="justify"> <b>Click the <b>Continue</b> button below and the picture will restart and attempt to connect to the network.</b> </p>
<p align="justify"> <b>After you have clicked <b>Continue</b> you may return to your browser to continue the setup process.</b></p>

    <div class="formContainer">
                <div class="formContentContainer">        
                    <form action="machine-reset" method="POST">
                        <input type="submit" class="submitButton" name="submitButton" value="Continue">
                    </form>
                </div>
    </div>

</div>
</div>
</body>
</html>
