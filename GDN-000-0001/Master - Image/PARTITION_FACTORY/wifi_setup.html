    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0">
    <style>
        body {
        font-family: Arial, Helvetica, sans-serif;
        color: #555555;
        }
        .formContainer {
            min-height: 100%;
            width: 100%;
            background: white;
            position: absolute;
            padding: 5px 5px 5px 5px;
            box-sizing: border-box;
            border-radius: 8px;
        }
        .formHeader {
            text-align: center;
        }
        .formContentContainer {
            margin-top: 15%;
            width: 98%;
        }
        .formInput {
            display: block;
            margin: 0px 0px 15px 20px;
            padding: 4px;
            width: 90%;
            height: 5%;
            box-sizing: border-box;
            border: none;
            outline: none;
            border-bottom: 1px solid #aaa;
            font-size: 16px;
        }
        .submitButton {
            background: #46B1E1;
            color: white;
            margin: 10px 20px;
            width: 90%;
            height: 8%;
            border: none;
            border-radius: 4px;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 500;
            font-size: 20px;
        }
        .center {
          margin: auto;
          width: 100%;
        }
        select, option{
        width: 100%;
        align: center;
        padding:8px 16px;
        font-size:22px;
        font-weight:500;
        border:0px;
        border-radius:4px;
        }
    
    </style>
    <title>AlpsArt Setup</title>
    </head>
    <body>
    <div class="formContainer">
                <div class="formContentContainer">
                    <h2 class="formHeader"><span style="color: #46B1E1">Alps</span><span style="color: #F836B7">Art</span> Setup</h2>               
                    <form action="submit-form" method="POST">
                        {{ssid_html}}
                        <input type="text" id="ssid" name="ssid" class="formInput" placeholder="Type WiFi Network SSID Here"/>
                        </br>
                        <p> Select your Wi-Fi network from the list or if it is hidden or not currently available type the SSID. </p>  
                        <p> Enter the password below and click 
                    
                    <b>SAVE SETTINGS</b>. </p></br>
                        <input type="text" id="passkey" name="passkey" class="formInput" placeholder="Password" required/>
                        <input type="submit" class="submitButton" name="submitButton" value="Save Settings">
                    </form>
                </div>
    </div>
    </body>
    </html>
